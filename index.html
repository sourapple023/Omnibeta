<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="appTitle">Gemini Flash AI</title>
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-hover: #1557b0;
            --bg-canvas: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #202124;
            --text-sub: #5f6368;
            --border: #dadce0;
            --ai-bubble: #f1f3f4;
            --user-bubble: #e8f0fe;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            background-color: var(--bg-canvas);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        #container {
            width: 100%;
            max-width: 900px;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin: 20px;
            border-radius: 12px;
            overflow: hidden;
        }

        /* Header & Settings */
        header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }

        h1 { font-size: 1.25rem; margin: 0; color: var(--primary); }

        .settings-bar {
            display: flex;
            gap: 10px;
            background: #f1f3f4;
            padding: 8px 15px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .input-group { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }

        input, select, textarea {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            outline: none;
        }

        /* Chat Area */
        #chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #fff;
        }

        .chat-message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .chat-message.user { align-self: flex-end; }
        .chat-message.ai { align-self: flex-start; }

        .message-bubble {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .user .message-bubble {
            background-color: var(--user-bubble);
            color: #174ea6;
            border-bottom-right-radius: 4px;
        }

        .ai .message-bubble {
            background-color: var(--ai-bubble);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        /* Markdown Styling */
        .message-bubble pre {
            background: #202124;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
        }
        .message-bubble code { font-family: monospace; background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 4px; }

        /* Input Area */
        .input-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: #fff;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: #f1f3f4;
            padding: 10px 15px;
            border-radius: 24px;
        }

        #user-input {
            flex-grow: 1;
            border: none;
            background: transparent;
            resize: none;
            max-height: 150px;
            padding: 8px 0;
            font-size: 1rem;
        }

        #send-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        #send-button:hover:not(:disabled) { background: var(--primary-hover); }
        #send-button:disabled { background: #ccc; cursor: not-allowed; }

        .loading { display: none; text-align: center; font-size: 0.8rem; color: var(--text-sub); margin-bottom: 10px; }
        .loading.visible { display: block; }
    </style>
</head>
<body>

<div id="container">
    <header>
        <h1 data-translate="headerTitle">Gemini Flash 2.0</h1>
        <button id="clear-chat-button" style="background:none; border:1px solid #ccc; border-radius:4px; cursor:pointer; font-size: 12px; padding: 4px 8px;" data-translate="clearChatButton">Clear Chat</button>
    </header>

    <div class="settings-bar">
        <div class="input-group">
            <label data-translate="apiKeyLabel">API Key:</label>
            <input type="password" id="api-key-input" placeholder="Paste key here...">
            <button id="save-api-key-button" data-translate="saveButton">Save</button>
        </div>
        <div class="input-group">
            <select id="language-selector">
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="ko">한국어</option>
            </select>
        </div>
        <span id="api-key-status" style="font-size: 11px;"></span>
    </div>

    <div id="chat-history">
        <!-- Messages appear here -->
    </div>

    <div class="input-footer">
        <div id="loading-indicator" class="loading">Gemini is thinking...</div>
        <div class="input-wrapper">
            <textarea id="user-input" rows="1" placeholder="Ask me anything..." data-translate="inputPlaceholder"></textarea>
            <button id="send-button" data-translate="sendButton">Send</button>
        </div>
    </div>
</div>

<script>
    const API_KEY_STORAGE_KEY = 'geminiApiKey';
    const GEMINI_MODEL = 'gemini-2.5-flash'; 
    const GEMINI_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=`;

    const chatHistory = document.getElementById('chat-history');
    const userInput = document.getElementById('user-input');
    const sendButton = document.getElementById('send-button');
    const apiKeyInput = document.getElementById('api-key-input');
    const saveApiKeyButton = document.getElementById('save-api-key-button');
    const loadingIndicator = document.getElementById('loading-indicator');

    let conversationHistory = [];
    let currentApiKey = localStorage.getItem(API_KEY_STORAGE_KEY) || '';

    // Initialize Markdown
    marked.setOptions({ gfm: true, breaks: true });

    if (currentApiKey) {
        apiKeyInput.placeholder = "Key Stored (Ends in " + currentApiKey.slice(-4) + ")";
        saveApiKeyButton.textContent = "Remove";
    }

    function displayMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `chat-message ${role}`;
        
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        
        // Render Markdown for AI, plain text for User
        if (role === 'ai') {
            bubble.innerHTML = marked.parse(text);
        } else {
            bubble.textContent = text;
        }

        msgDiv.appendChild(bubble);
        chatHistory.appendChild(msgDiv);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text || !currentApiKey) {
            if (!currentApiKey) alert("Please enter and save an API Key first.");
            return;
        }

        displayMessage('user', text);
        userInput.value = '';
        userInput.style.height = 'auto';
        
        conversationHistory.push({ role: "user", parts: [{ text: text }] });
        
        loadingIndicator.classList.add('visible');
        sendButton.disabled = true;

        try {
            const response = await fetch(GEMINI_API_URL + currentApiKey, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: conversationHistory,
                    systemInstruction: { parts: [{ text: "You are a helpful, concise AI assistant. Use markdown for lists and code." }] }
                })
            });

            const data = await response.json();
            const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error: No response.";
            
            displayMessage('ai', aiText);
            conversationHistory.push({ role: "model", parts: [{ text: aiText }] });
        } catch (e) {
            displayMessage('ai', "System Error: Unable to reach Gemini.");
        } finally {
            loadingIndicator.classList.remove('visible');
            sendButton.disabled = false;
        }
    }

    // Event Listeners
    sendButton.addEventListener('click', sendMessage);
    
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = userInput.scrollHeight + 'px';
    });

    saveApiKeyButton.addEventListener('click', () => {
        if (currentApiKey) {
            localStorage.removeItem(API_KEY_STORAGE_KEY);
            currentApiKey = '';
            apiKeyInput.value = '';
            apiKeyInput.placeholder = "Paste key here...";
            saveApiKeyButton.textContent = "Save";
        } else {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem(API_KEY_STORAGE_KEY, key);
                currentApiKey = key;
                apiKeyInput.value = '';
                apiKeyInput.placeholder = "Key Saved!";
                saveApiKeyButton.textContent = "Remove";
            }
        }
    });

    document.getElementById('clear-chat-button').addEventListener('click', () => {
        chatHistory.innerHTML = '';
        conversationHistory = [];
    });
</script>

</body>
</html>
