<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OMNI</title>

<style>
* { box-sizing: border-box; }
html, body {
  margin:0;
  height:100%;
  font-family: monospace;
  background:#fff;
  color:#000;
}
#log {
  height: calc(100% - 60px);
  overflow-y:auto;
  padding:10px;
  white-space:pre-wrap;
}
#bar {
  display:flex;
  border-top:1px solid #000;
}
input {
  flex:1;
  padding:10px;
  border:none;
  outline:none;
  font-family:inherit;
}
button {
  width:80px;
  border:none;
  border-left:1px solid #000;
  background:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="log">🧠 OMNI HYBRID BRAIN ONLINE\n</div>

<div id="bar">
  <input id="input" placeholder="You >" />
  <button onclick="send()">Send</button>
</div>

<script>
let log = document.getElementById("log")
let input = document.getElementById("input")

function add(text) {
  log.textContent += "\n" + text + "\n"
  log.scrollTop = log.scrollHeight
}

async function send() {
  let text = input.value.trim()
  if (!text) return

  add("You > " + text)
  input.value = ""

  try {
    let res = await fetch("http://192.168.88.12:5055/think", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({input: text})
    })

    let data = await res.json()
    add("OMNI:\n" + data.output)

  } catch {
    add("⚠️ Cannot reach OMNI backend")
  }
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") send()
})
</script>

</body>
</html>
