<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 2.5 Flash UI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #4b7bec;
            --bg-main: #f0f2f5;
            --sidebar-bg: #ffffff;
            --chat-bg: #ffffff;
            --user-msg: #4b7bec;
            --ai-msg: #f1f3f4;
            --text-dark: #2f3542;
            --text-light: #f1f2f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-main);
            color: var(--text-dark);
        }

        /* Sidebar / Settings */
        #sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid #dcdde1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .sidebar-header { font-weight: bold; font-size: 1.2rem; margin-bottom: 25px; color: var(--primary); }
        
        .setting-item { margin-bottom: 20px; }
        .setting-item label { display: block; font-size: 0.85rem; margin-bottom: 8px; font-weight: 600; }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--primary); }

        #save-key-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Main Chat Area */
        #main-chat {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #chat-window {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 15%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg { max-width: 80%; padding: 15px 20px; border-radius: 15px; line-height: 1.6; position: relative; }
        .user { align-self: flex-end; background: var(--user-msg); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--ai-msg); color: var(--text-dark); border-bottom-left-radius: 2px; }

        .ai pre { background: #2f3542; color: #ffa502; padding: 10px; border-radius: 8px; overflow-x: auto; }

        /* Input Bar */
        .input-area {
            padding: 20px 15%;
            background: white;
            border-top: 1px solid #dcdde1;
        }

        .input-container {
            display: flex;
            background: #f1f3f4;
            padding: 10px 15px;
            border-radius: 30px;
            align-items: center;
        }

        #user-input {
            flex-grow: 1;
            border: none;
            background: transparent;
            padding: 10px;
            font-size: 1rem;
            outline: none;
            resize: none;
        }

        #send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-dots { font-size: 0.8rem; color: #7f8c8d; margin-bottom: 5px; display: none; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header" data-key="app_title">Gemini 2.5 Flash</div>
        
        <div class="setting-item">
            <label data-key="lang_label">Language / 언어</label>
            <select id="lang-select">
                <option value="en">English</option>
                <option value="ko">한국어 (Korean)</option>
            </select>
        </div>

        <div class="setting-item">
            <label data-key="api_label">API Key</label>
            <input type="password" id="api-key" placeholder="Enter Gemini API Key">
            <button id="save-key-btn" data-key="save_btn">Save Key</button>
        </div>

        <div style="margin-top: auto; font-size: 0.75rem; color: #95a5a6;">
            Model: gemini-2.5-flash
        </div>
    </aside>

    <main id="main-chat">
        <div id="chat-window">
            <!-- Messages load here -->
        </div>

        <div class="input-area">
            <div id="loader" class="loading-dots" data-key="loading_text">Thinking...</div>
            <div class="input-container">
                <textarea id="user-input" rows="1" data-key="input_placeholder" placeholder="Type a message..."></textarea>
                <button id="send-btn">➔</button>
            </div>
        </div>
    </main>

<script>
    const translations = {
        en: {
            app_title: "Gemini 2.5 Flash",
            lang_label: "Language",
            api_label: "API Key",
            save_btn: "Save Key",
            input_placeholder: "Type a message...",
            loading_text: "Gemini 2.5 is thinking...",
            key_saved: "Key Saved!",
            key_removed: "Key Removed"
        },
        ko: {
            app_title: "제미나이 2.5 플래시",
            lang_label: "언어 설정",
            api_label: "API 키",
            save_btn: "키 저장",
            input_placeholder: "메시지를 입력하세요...",
            loading_text: "제미나이가 생각 중입니다...",
            key_saved: "키가 저장되었습니다!",
            key_removed: "키가 삭제되었습니다"
        }
    };

    const config = {
        model: 'gemini-2.5-flash',
        url: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='
    };

    let chatHistory = [];
    let apiKey = localStorage.getItem('gemini_key') || '';

    // Initialize UI
    function updateLanguage(lang) {
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                el.placeholder = translations[lang][key];
            } else {
                el.textContent = translations[lang][key];
            }
        });
    }

    if(apiKey) {
        document.getElementById('api-key').placeholder = "••••••••••••";
        document.getElementById('save-key-btn').textContent = "Clear Key";
    }

    // Handle Language Toggle
    document.getElementById('lang-select').addEventListener('change', (e) => {
        updateLanguage(e.target.value);
    });

    async function callGemini(prompt) {
        if(!apiKey) return alert("Please set your API Key first.");
        
        document.getElementById('loader').style.display = 'block';
        chatHistory.push({ role: "user", parts: [{ text: prompt }] });
        renderMessage('user', prompt);

        try {
            const response = await fetch(config.url + apiKey, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: chatHistory })
            });
            
            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            
            chatHistory.push({ role: "model", parts: [{ text: reply }] });
            renderMessage('ai', reply);
        } catch (err) {
            renderMessage('ai', "Error: Check your API Key or connection.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function renderMessage(role, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = role === 'ai' ? marked.parse(text) : text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    // Event Listeners
    document.getElementById('send-btn').onclick = () => {
        const input = document.getElementById('user-input');
        if(input.value.trim()) {
            callGemini(input.value.trim());
            input.value = '';
        }
    };

    document.getElementById('save-key-btn').onclick = () => {
        const input = document.getElementById('api-key');
        if(apiKey) {
            localStorage.removeItem('gemini_key');
            apiKey = '';
            input.value = '';
            location.reload();
        } else {
            apiKey = input.value.trim();
            localStorage.setItem('gemini_key', apiKey);
            alert("Key Saved");
            location.reload();
        }
    };

    // Auto-resize textarea
    document.getElementById('user-input').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });
</script>
</body>
</html>
